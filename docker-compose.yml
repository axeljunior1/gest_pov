services:
  postgres:
    image: postgres:16-alpine
    container_name: monapp-postgres1
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_products
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: ErpProd2026!
    volumes:
      - postgres_data1:/var/lib/postgresql/data
    networks:
      - apteco-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_products"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monapp-backend1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/erp_products
      SPRING_DATASOURCE_USERNAME: erp_user
      SPRING_DATASOURCE_PASSWORD: ErpProd2026!
      APP_JWT_SECRET: erp-docker-change-me-min-256-bits-long-key!!
    volumes:
      - backend_uploads1:/app/uploads
      - backend_license1:/app/gest-pov-data
    networks:
      - apteco-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monapp-frontend1
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - apteco-network

  proxy:
    image: caddy:2-alpine
    container_name: monapp-proxy1
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data1:/data
      - caddy_config1:/config
    networks:
      - apteco-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: monapp-quick-tunnel1
    restart: no
    command: tunnel --no-autoupdate --url http://proxy:80
    depends_on:
      - proxy
    networks:
      - apteco-network

volumes:
  postgres_data1:
  backend_uploads1:
  backend_license1:
  caddy_data1:
  caddy_config1:

networks:
  apteco-network:
    driver: bridge