# Profil dev local : outils admin (reset/seed demo)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/erp_products}
    username: ${SPRING_DATASOURCE_USERNAME:erp_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ErpProd2026!}

app:
  admin:
    reset-enabled: true
  seed:
    demo-auto: false
  license:
    enforcement-enabled: false

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoint:
    health:
      show-details: always

info:
  app:
    name: ERP Produits
    description: Module gestion produits + POS
    version: '1.0.0'
