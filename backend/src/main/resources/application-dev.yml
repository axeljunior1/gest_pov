# Profil dev local : outils admin (reset/seed demo)
spring:
  config:
    activate:
      on-profile: dev

app:
  admin:
    reset-enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoint:
    health:
      show-details: always

info:
  app:
    name: ERP Produits
    description: Module gestion produits + POS
    version: '1.0.0'
