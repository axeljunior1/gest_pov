spring:
  application:
    name: product-management
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/erp_products
    username: erp_user
    password: ErpProd2026!
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 10
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  address: 0.0.0.0

app:
  upload:
    dir: uploads
  stock:
    allow-negative-stock: false
  jwt:
    secret: erp-dev-secret-change-in-production-min-256-bits-long-key!!
    expiration-ms: 86400000

logging:
  level:
    com.erp.products: INFO
