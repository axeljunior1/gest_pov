spring:
  application:
    name: product-management
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  datasource:
    # Variables d'environnement pour Docker ; valeurs par défaut = dev local (db.ps1 / run.bat)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/erp_products}
    username: ${SPRING_DATASOURCE_USERNAME:erp_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ErpProd2026!}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 10
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  address: 0.0.0.0

app:
  upload:
    dir: uploads
  stock:
    allow-negative-stock: false
  seed:
    system-enabled: true
    demo-enabled: true
    demo-auto: false
  jwt:
    secret: erp-dev-secret-change-in-production-min-256-bits-long-key!!
    expiration-ms: 86400000
  admin:
    reset-token: dev-reset-token-change-me
  license:
    data-dir: ./gest-pov-data
    enforcement-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.erp.products: INFO
