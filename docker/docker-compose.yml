services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    env_file:
      - postgres.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_products"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  erp_pgdata:
    name: erp_pgdata
