# Déploiement avec images pré-buildées (sans build local).
# Usage : docker compose -f compose.images.yml --env-file ../.env up -d
# (depuis le dossier deploy/)

services:
  postgres:
    image: postgres:16-alpine
    container_name: monapp-postgres1
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_net:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - app_net

  backend:
    image: ${BACKEND_IMAGE}
    container_name: monapp-backend1
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
    volumes:
      - backend_uploads_net:/app/uploads
      - backend_license_net:/app/gest-pov-data
    networks:
      - app_net

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: monapp-frontend1
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app_net

  proxy:
    image: caddy:2-alpine
    container_name: monapp-proxy1
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "127.0.0.1:${APP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - app_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: monapp-quick-tunnel1
    restart: "no"
    command: tunnel --no-autoupdate --url http://proxy:80
    depends_on:
      - proxy
    networks:
      - app_net

volumes:
  postgres_data_net:
  backend_uploads_net:
  backend_license_net:

networks:
  app_net:
